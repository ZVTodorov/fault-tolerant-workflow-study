version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    env_file:
      - .env
    volumes:
      - ./n8n_data:/home/node/.n8n
    restart: unless-stopped

  httpbin:
    image: kennethreitz/httpbin
    container_name: httpbin
    ports:
      - "8082:80"
    restart: unless-stopped